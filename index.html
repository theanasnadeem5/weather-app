<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glass Weather</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1a2740;
  }
  .app {
    position: relative;
    width: 100%;
    max-width: 380px;
    margin: 0 auto;
    border-radius: 24px;
    overflow: hidden;
    background: linear-gradient(160deg,#5b86c9 0%,#7aa6e0 40%,#9fc4ec 100%);
    min-height: 680px;
    color: #fff;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .map-bg { position:absolute; inset:0; width:100%; height:100%; opacity:0.35; }
  .content { position: relative; padding: 1.5rem 1.25rem; }
  .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.25rem; }
  .city { font-size:13px; opacity:0.85; display:flex; align-items:center; gap:6px; }
  .local-time { font-size:13px; opacity:0.7; margin-top:2px; }
  .live-badge {
    background:rgba(255,255,255,0.18); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    border:0.5px solid rgba(255,255,255,0.35); border-radius:14px; padding:8px 10px;
    display:flex; align-items:center; gap:6px; font-size:12px;
  }
  .glass-card {
    background:rgba(255,255,255,0.16); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
    border:0.5px solid rgba(255,255,255,0.35); border-radius:20px; padding:1.5rem; text-align:center; margin-bottom:1rem;
  }
  .glass-card i.main-icon { font-size:64px; }
  .temp { font-size:48px; font-weight:500; margin:8px 0; }
  .condition { font-size:15px; opacity:0.9; }
  .stats { display:flex; justify-content:center; gap:20px; margin-top:14px; font-size:13px; opacity:0.85; }
  .hourly { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin-bottom:1rem; }
  .hour-card {
    background:rgba(255,255,255,0.14); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    border:0.5px solid rgba(255,255,255,0.25); border-radius:8px; padding:10px 4px; text-align:center;
  }
  .hour-card .hr { font-size:11px; opacity:0.8; }
  .hour-card i { font-size:18px; margin:4px 0; display:inline-block; }
  .hour-card .ht { font-size:13px; font-weight:500; }
  .clocks-card {
    background:rgba(255,255,255,0.14); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
    border:0.5px solid rgba(255,255,255,0.3); border-radius:20px; padding:1rem 1.1rem; margin-bottom:1.5rem;
  }
  .clocks-title { font-size:13px; font-weight:500; margin-bottom:10px; display:flex; align-items:center; gap:6px; }
  .clock-row { display:flex; justify-content:space-between; font-size:13px; opacity:0.95; padding:4px 0; }
  .clock-row span:last-child { font-weight:500; }
  .gps-btn {
    position:absolute; bottom:24px; right:24px; width:56px; height:56px; border-radius:50%;
    background:rgba(255,255,255,0.25); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
    border:0.5px solid rgba(255,255,255,0.4); display:flex; align-items:center; justify-content:center;
    font-size:24px; color:#fff; cursor:pointer; transition: transform 0.15s ease;
  }
  .gps-btn:active { transform: scale(0.92); }
  .clocks-flex { display:flex; flex-direction:column; gap:8px; }
</style>
</head>
<body>

<div class="app">

  <svg class="map-bg" viewBox="0 0 380 680" aria-hidden="true">
    <path d="M0 120 Q60 90 120 130 T240 110 T380 140 V0 H0 Z" fill="#ffffff" opacity="0.15"/>
    <path d="M0 260 Q90 220 190 260 T380 240 V680 H0 Z" fill="#ffffff" opacity="0.10"/>
    <circle cx="80" cy="200" r="40" fill="#ffffff" opacity="0.08"/>
    <circle cx="300" cy="380" r="60" fill="#ffffff" opacity="0.08"/>
    <circle cx="150" cy="500" r="50" fill="#ffffff" opacity="0.06"/>
    <line x1="0" y1="100" x2="380" y2="100" stroke="#fff" stroke-width="1" opacity="0.1"/>
    <line x1="0" y1="200" x2="380" y2="200" stroke="#fff" stroke-width="1" opacity="0.1"/>
    <line x1="0" y1="300" x2="380" y2="300" stroke="#fff" stroke-width="1" opacity="0.1"/>
    <line x1="0" y1="400" x2="380" y2="400" stroke="#fff" stroke-width="1" opacity="0.1"/>
    <line x1="0" y1="500" x2="380" y2="500" stroke="#fff" stroke-width="1" opacity="0.1"/>
    <line x1="100" y1="0" x2="100" y2="680" stroke="#fff" stroke-width="1" opacity="0.1"/>
    <line x1="200" y1="0" x2="200" y2="680" stroke="#fff" stroke-width="1" opacity="0.1"/>
    <line x1="300" y1="0" x2="300" y2="680" stroke="#fff" stroke-width="1" opacity="0.1"/>
  </svg>

  <div class="content">

    <div class="top-bar">
      <div>
        <div class="city"><i class="ti ti-map-pin" aria-hidden="true"></i><span id="city-name">Detecting location...</span></div>
        <div class="local-time" id="local-time">--:--</div>
      </div>
      <div class="live-badge"><i class="ti ti-cloud" aria-hidden="true"></i> Live</div>
    </div>

    <div class="glass-card">
      <i class="ti ti-cloud-storm main-icon" id="main-icon" aria-hidden="true"></i>
      <div class="temp" id="temp">--°</div>
      <div class="condition" id="condition">Fetching weather...</div>
      <div class="stats">
        <span><i class="ti ti-droplet" aria-hidden="true"></i> <span id="humidity">--%</span></span>
        <span><i class="ti ti-wind" aria-hidden="true"></i> <span id="wind">-- km/h</span></span>
        <span><i class="ti ti-temperature" aria-hidden="true"></i> <span id="feels">--°</span></span>
      </div>
    </div>

    <div class="hourly" id="hourly"></div>

    <div class="clocks-card">
      <div class="clocks-title"><i class="ti ti-world" aria-hidden="true"></i> World clocks</div>
      <div class="clocks-flex" id="world-clocks"></div>
    </div>

  </div>

  <button class="gps-btn" id="gps-btn" aria-label="Use my location">
    <i class="ti ti-location" aria-hidden="true"></i>
  </button>

</div>

<script>
const conditions = [
  {name:"Clear sky", icon:"ti-sun"},
  {name:"Partly cloudy", icon:"ti-cloud-bolt"},
  {name:"Overcast", icon:"ti-cloud"},
  {name:"Light rain", icon:"ti-cloud-rain"},
  {name:"Thunderstorm", icon:"ti-cloud-storm"}
];

const worldCities = [
  {name:"New York", offset:-4},
  {name:"London", offset:1},
  {name:"Dubai", offset:4},
  {name:"Tokyo", offset:9},
  {name:"Sydney", offset:10}
];

function fmtTime(date, offset){
  const utc = date.getTime() + (date.getTimezoneOffset()*60000);
  const t = new Date(utc + 3600000*offset);
  return t.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function renderClocks(){
  const now = new Date();
  document.getElementById('local-time').textContent = now.toLocaleTimeString([], {weekday:'short', hour:'2-digit', minute:'2-digit'});
  const wc = document.getElementById('world-clocks');
  wc.innerHTML = worldCities.map(c => `
    <div class="clock-row">
      <span>${c.name}</span>
      <span>${fmtTime(now, c.offset)}</span>
    </div>`).join('');
}

function renderHourly(temp){
  const h = document.getElementById('hourly');
  const now = new Date();
  h.innerHTML = '';
  for(let i=1;i<=5;i++){
    const t = new Date(now.getTime() + i*3600000);
    const variance = Math.round((Math.random()-0.5)*4);
    h.innerHTML += `
      <div class="hour-card">
        <div class="hr">${t.getHours()}:00</div>
        <i class="ti ti-cloud" aria-hidden="true"></i>
        <div class="ht">${Math.round(temp+variance)}°</div>
      </div>`;
  }
}

function setWeather(cityLabel, lat, lon){
  document.getElementById('city-name').textContent = cityLabel;
  const temp = Math.round(15 + Math.random()*15);
  const cond = conditions[Math.floor(Math.random()*conditions.length)];
  document.getElementById('main-icon').className = 'ti ' + cond.icon + ' main-icon';
  document.getElementById('temp').textContent = temp + '°';
  document.getElementById('condition').textContent = cond.name;
  document.getElementById('humidity').textContent = Math.round(40+Math.random()*40) + '%';
  document.getElementById('wind').textContent = Math.round(5+Math.random()*20) + ' km/h';
  document.getElementById('feels').textContent = (temp + Math.round((Math.random()-0.5)*3)) + '°';
  renderHourly(temp);
}

document.getElementById('gps-btn').addEventListener('click', () => {
  document.getElementById('city-name').textContent = 'Locating...';
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      pos => setWeather('Lat ' + pos.coords.latitude.toFixed(2) + ', Lon ' + pos.coords.longitude.toFixed(2), pos.coords.latitude, pos.coords.longitude),
      () => setWeather('Kolkata, India')
    );
  } else {
    setWeather('Kolkata, India');
  }
});

renderClocks();
setInterval(renderClocks, 30000);
setWeather('Kolkata, India');
</script>

</body>
</html>
